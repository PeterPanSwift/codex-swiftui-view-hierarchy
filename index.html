<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="將 SwiftUI 程式碼轉換為可互動的 View Hierarchy。" />
    <title>SwiftUI View Hierarchy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <a class="brand" href="#" aria-label="SwiftUI View Hierarchy 首頁" data-i18n-aria="home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 6.5 12 3l7 3.5v11L12 21l-7-3.5v-11Z"/><path d="m8 9 4-2 4 2-4 2-4-2Zm0 4 4 2 4-2"/></svg>
        </span>
        <span>View Hierarchy</span>
      </a>
      <div class="header-copy" data-i18n="headerCopy">SwiftUI 結構視覺化工具</div>
      <div class="top-actions">
        <div class="language-switch" role="group" aria-label="語言" data-i18n-aria="languageControl">
          <button type="button" data-language="zh-Hant" aria-pressed="false">中文</button>
          <button type="button" data-language="en" aria-pressed="true">EN</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow" aria-hidden="true"><span></span></div>
          <h1><span data-i18n="heroTitle">把程式碼，變成</span><br /><em data-i18n="heroAccent">看得懂的階層。</em></h1>
          <p data-i18n="heroDescription">貼上 SwiftUI View 程式碼，即時生成可互動的視覺化結構。點擊節點即可展開或收合子 View。</p>
        </div>
        <figure class="hero-art">
          <div class="hero-art-glow" aria-hidden="true"></div>
          <img src="assets/arctic-fox-swift-hero.png" alt="可愛的北極狐抱著 Swift 標誌" data-i18n-alt="foxAlt" width="1000" height="746" />
        </figure>
      </section>

      <section class="workspace" aria-label="SwiftUI 階層圖產生器" data-i18n-aria="generatorRegion">
        <article class="panel editor-panel">
          <div class="panel-header">
            <div>
              <span class="step">01</span>
              <h2>SwiftUI Code</h2>
            </div>
            <div class="editor-actions">
              <button class="text-button" id="exampleButton" type="button" data-i18n="loadExample">載入範例</button>
              <button class="icon-button" id="clearButton" type="button" aria-label="清除程式碼" title="清除程式碼" data-i18n-aria="clearCode" data-i18n-title="clearCode">
                <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3m-8 0 1 13h8l1-13M10 11v5m4-5v5"/></svg>
              </button>
            </div>
          </div>
          <div class="code-wrap">
            <div class="line-numbers" id="lineNumbers" aria-hidden="true"></div>
            <textarea id="codeInput" aria-label="SwiftUI 程式碼" data-i18n-aria="swiftCode" spellcheck="false" autocomplete="off"></textarea>
          </div>
          <div class="editor-footer">
            <span><i></i> Swift</span>
            <span id="lineCount">0 lines</span>
          </div>
          <button class="generate-button" id="generateButton" type="button">
            <span data-i18n="generate">生成階層圖</span>
            <svg viewBox="0 0 24 24"><path d="M5 12h14m-5-5 5 5-5 5"/></svg>
          </button>
        </article>

        <article class="panel diagram-panel">
          <div class="panel-header diagram-header">
            <div>
              <span class="step">02</span>
              <h2>View Hierarchy</h2>
            </div>
            <div class="diagram-tools">
              <label class="color-control" title="設定主題顏色" data-i18n-title="themeColor">
                <input id="treeColorInput" type="color" value="#f05138" aria-label="設定主題顏色" data-i18n-aria="themeColor" />
                <span class="color-label" data-i18n="themeColorLabel">主題顏色</span>
              </label>
              <label class="name-only-control">
                <input id="nameOnlyToggle" type="checkbox" aria-label="只顯示名稱" data-i18n-aria="namesOnly" checked />
                <span class="switch-track" aria-hidden="true"><span></span></span>
                <span class="name-only-label" data-i18n="namesOnly">只顯示名稱</span>
              </label>
              <div class="toolbar" aria-label="階層圖控制列" data-i18n-aria="diagramControls">
                <button class="icon-button" id="zoomOutButton" type="button" aria-label="縮小" data-i18n-aria="zoomOut">−</button>
                <span id="zoomValue">100%</span>
                <button class="icon-button" id="zoomInButton" type="button" aria-label="放大" data-i18n-aria="zoomIn">＋</button>
                <span class="divider"></span>
                <button class="icon-button fit-icon" id="fitButton" type="button" aria-label="重設縮放" title="重設縮放" data-i18n-aria="resetZoom" data-i18n-title="resetZoom">
                  <svg viewBox="0 0 24 24"><path d="M8 3H3v5m13-5h5v5M8 21H3v-5m13 5h5v-5"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="diagram-canvas" id="diagramCanvas">
            <div class="tree-stage" id="treeStage"></div>
            <div class="empty-state" id="emptyState" hidden>
              <span>{ }</span>
              <h3 data-i18n="emptyTitle">等待 SwiftUI 程式碼</h3>
              <p data-i18n="emptyDescription">在左側貼上程式後，按下「生成階層圖」</p>
            </div>
          </div>
          <div class="diagram-footer">
            <div><span class="legend container-dot"></span> <span data-i18n="containerView">容器 View</span></div>
            <div><span class="legend leaf-dot"></span> <span data-i18n="leafNode">葉節點</span></div>
            <div class="stats"><span id="nodeCount">0 Views</span><span id="depthCount">0 Levels</span></div>
          </div>
        </article>
      </section>

      <p class="hint" data-i18n-html="hint"><span>TIP</span> 點擊帶有 <b>−</b> 的節點，即可收合其所有子 View；開啟「只顯示名稱」可隱藏參數。</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
